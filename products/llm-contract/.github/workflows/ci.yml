name: CI

on:
  push:
    branches: [main]
    paths:
      - "products/llm-contract/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "products/llm-contract/**"

defaults:
  run:
    working-directory: products/llm-contract

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint
        run: ruff check llm_contract/ tests/

      - name: Run tests
        run: pytest tests/ -v --cov=llm_contract --cov-report=term-missing

  publish:
    name: Publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'release:')
    permissions:
      id-token: write  # OIDC trusted publishing — no stored API tokens

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build
        run: |
          uv pip install --system hatchling
          python -m hatchling build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: products/llm-contract/dist/
